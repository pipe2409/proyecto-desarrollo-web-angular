<header class="border-b border-slate-800 bg-slate-950/70 backdrop-blur text-slate-100">
  <div class="mx-auto max-w-6xl px-4 py-5 flex items-center justify-between">
    <h1 class="text-xl font-semibold tracking-tight">Servicios (Admin)</h1>
    <button (click)="goToCreate()"
      class="rounded-lg bg-sky-600 px-4 py-2 text-sm font-medium hover:bg-sky-500">
      + Crear servicio
    </button>
  </div>
</header>

<main class="mx-auto max-w-6xl px-4 py-8 text-slate-100">

  <section class="grid gap-4 sm:grid-cols-3">
    <div class="rounded-2xl border border-slate-800 bg-slate-900/40 p-5">
      <div class="text-sm text-slate-400">Total servicios</div>
      <div class="mt-1 text-2xl font-semibold">{{ servicios.length }}</div>
    </div>
    <div class="rounded-2xl border border-slate-800 bg-slate-900/40 p-5">
      <div class="text-sm text-slate-400">Ruta</div>
      <div class="mt-1 text-sm text-slate-200">/servicios</div>
    </div>
  </section>

  <section class="mt-8">
    <h2 class="text-lg font-semibold">Listado</h2>

    <div class="mt-4 grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
      <article
        *ngFor="let servicio of servicios"
        class="group rounded-2xl border border-slate-800 bg-slate-900/40 overflow-hidden hover:border-slate-700 transition">

        <div class="aspect-[16/10] bg-slate-800 overflow-hidden">
          <img [src]="servicio.image" alt="Imagen"
            class="h-full w-full object-cover opacity-95 group-hover:scale-[1.02] transition"
            (error)="servicio.image = 'https://images.pexels.com/photos/271624/pexels-photo-271624.jpeg'">
        </div>

        <div class="p-5">
          <div class="flex items-start justify-between gap-3">
            <div>
              <div class="text-xs text-slate-400">ID {{ servicio.id }}</div>
              <h3 class="mt-1 text-base font-semibold">{{ servicio.title }}</h3>
              <p class="text-xs text-slate-400">{{ servicio.subtitle }}</p>
            </div>
            <span class="shrink-0 rounded-full border border-slate-700 bg-slate-950 px-3 py-1 text-xs text-slate-200">
              {{ servicio.features.length }} features
            </span>
          </div>

          <p class="mt-3 text-sm text-slate-300/90">{{ servicio.description }}</p>

          <div class="mt-3 text-xs text-slate-400">
            {{ servicio.features.join(' • ') }}
          </div>

          <div class="mt-5 flex justify-end gap-2">
            <button (click)="goToEdit(servicio.id)"
              class="rounded-lg border border-slate-800 px-3 py-2 text-xs hover:bg-slate-900">
              Editar
            </button>
            <button (click)="deleteServicio(servicio.id)"
              class="rounded-lg border border-slate-800 px-3 py-2 text-xs hover:bg-slate-900">
              Eliminar
            </button>
          </div>
        </div>
      </article>

      <div *ngIf="servicios.length === 0"
        class="rounded-2xl border border-dashed border-slate-700 bg-slate-900/30 p-8 text-center text-slate-300 sm:col-span-2 lg:col-span-3">
        No hay servicios registrados.
      </div>
    </div>
  </section>
</main>
